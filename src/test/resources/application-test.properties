# Use a temporary filefor integration tests on Windows
spring.datasource.url=jdbc:sqlite:data/expense_tracker_test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Ensure Spring Boot doesn't try to use a real file if one exists
spring.datasource.username=sa
spring.datasource.password=

# Allow bean overriding
spring.main.allow-bean-definition-overriding=true
