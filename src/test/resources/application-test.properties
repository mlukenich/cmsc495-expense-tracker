# Use a temporary file-based SQLite for integration tests on Windows for better compatibility
spring.datasource.url=jdbc:sqlite:expense_tracker_test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Ensure Spring Boot doesn't try to use a real file if one exists
spring.datasource.username=sa
spring.datasource.password=

# Allow bean overriding
spring.main.allow-bean-definition-overriding=true
